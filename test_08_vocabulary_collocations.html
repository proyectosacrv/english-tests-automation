<title>C1 Test 08 – Vocabulary Collocations</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}header{background:#1a365d;color:white;padding:20px 32px}header h1{font-size:1.3rem;font-weight:700}header p{opacity:.75;font-size:.85rem;margin-top:3px}.pw{background:#bee3f8;height:5px}.pb{background:#4299e1;height:5px;transition:width .3s}main{max-width:740px;margin:0 auto;padding:28px 16px}.qc{background:white;border-radius:12px;padding:26px 30px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:20px;display:none}.qc.active{display:block}.qm{font-size:.74rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}.qt{font-size:1.02rem;line-height:1.65;margin-bottom:18px;font-weight:500}.opts{display:flex;flex-direction:column;gap:9px}.opt{padding:11px 15px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .13s;font-size:.95rem;display:flex;align-items:center;gap:10px}.opt:hover:not(.dis){border-color:#4299e1;background:#ebf8ff}.opt.cor{border-color:#38a169;background:#f0fff4;color:#276749;font-weight:600}.opt.wrn{border-color:#e53e3e;background:#fff5f5;color:#c53030}.opt.rev{border-color:#38a169;background:#f0fff4;color:#276749;font-weight:600}.opt.dis{cursor:default}.ol{width:25px;height:25px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700;flex-shrink:0}.fb{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:.88rem;line-height:1.55;display:none}.fb.show{display:block}.fbok{background:#f0fff4;border:1px solid #9ae6b4;color:#276749}.fbfl{background:#fff5f5;border:1px solid #feb2b2;color:#c53030}.qnav{display:flex;justify-content:space-between;margin-top:18px}.btn{padding:9px 20px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer}.btn:disabled{opacity:.35;cursor:default}.bbk{background:#e2e8f0;color:#4a5568}.bnx{background:#2b6cb0;color:white}.bfn{background:#38a169;color:white}#results{display:none;background:white;border-radius:12px;padding:32px;box-shadow:0 2px 10px rgba(0,0,0,.08)}.sc{width:118px;height:118px;border-radius:50%;border:8px solid #2b6cb0;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px}.sn{font-size:2rem;font-weight:800;color:#2b6cb0;line-height:1}.sd{font-size:.82rem;color:#718096}.lb{display:inline-block;padding:5px 16px;border-radius:20px;font-weight:700;font-size:.95rem}.la2{background:#feebc8;color:#c05621}.lb1{background:#fefcbf;color:#744210}.lb2{background:#c6f6d5;color:#276749}.lc1{background:#bee3f8;color:#2c5282}.lc2{background:#e9d8fd;color:#553c9a}.rs{text-align:center;margin-bottom:28px}.rs h2{font-size:1.2rem;margin-bottom:6px}.rs p{color:#718096;font-size:.92rem;line-height:1.6}.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0 24px}.sb{background:#f7fafc;border-radius:8px;padding:12px;text-align:center}.sl{font-size:.76rem;color:#718096}.sv{font-size:1.15rem;font-weight:700;color:#2b6cb0}.ah{font-size:.83rem;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e2e8f0;padding-bottom:6px;margin-bottom:12px}.ai{padding:12px 14px;border-radius:8px;margin-bottom:8px;border-left:4px solid}.aok{border-color:#38a169;background:#f0fff4}.afl{border-color:#e53e3e;background:#fff5f5}.aih{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px}.aiq{font-size:.85rem;color:#4a5568;flex:1}.aib{font-size:.72rem;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}.aok .aib{background:#9ae6b4;color:#276749}.afl .aib{background:#feb2b2;color:#c53030}.aid{font-size:.8rem;color:#718096;margin-top:3px}.ais{font-size:.73rem;color:#a0aec0;margin-top:2px}.br{width:100%;margin-top:20px;padding:12px;background:#2b6cb0;color:white;border:none;border-radius:8px;font-size:.97rem;font-weight:600;cursor:pointer}</style>
<link rel="stylesheet" href="mobile.css"></head>
<body>
<header><h1>08. Advanced English Grammar Test — C1</h1><p>Choose the correct option · 20 questions · Vocabulary &amp; Collocations</p><a href="index.html" style="color:white;opacity:.75;font-size:.8rem;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-top:6px">← Back to tests</a></header>
<div class="pw"><div class="pb" id="pb" style="width:0%"></div></div>
<main><div id="qcon"></div>
<div id="results"><div class="rs"><div class="sc"><span class="sn" id="rn">0</span><span class="sd" id="rd">/ 20</span></div><span class="lb" id="rb">—</span><h2 id="rt" style="margin-top:10px"></h2><p id="rde"></p></div><div class="sg" id="rsk"></div><div class="ah">Question-by-question analysis</div><div id="ran"></div><button class="br" onclick="restart()">↺ Try Again</button></div>
</main>
<script>
const Q=[
  {s:"Verb Collocation",t:"The company … a profit of £2 million in the first quarter.",o:["made","did","won"],c:0,e:"'Make a profit' is the standard collocation in business English. 'Do a profit' and 'win a profit' are not natural collocations."},
  {s:"Adjective Collocation",t:"She made a … contribution to the research — without her it wouldn't have been possible.",o:["vital","critic","serious"],c:0,e:"'Vital contribution' is a strong collocation meaning essential and critically important. 'Critic contribution' is not a natural phrase. 'Serious contribution' can work but 'vital' is the most natural collocate here."},
  {s:"Noun Collocation",t:"He had to … a difficult decision about his career.",o:["make","take","do"],c:0,e:"'Make a decision' is the standard collocation. 'Take a decision' is acceptable in formal British English but 'make' is more universal. 'Do a decision' is not a valid collocation."},
  {s:"Verb Collocation",t:"She … an interest in photography after visiting Japan.",o:["developed","made","grew"],c:0,e:"'Develop an interest' is the natural collocation for the gradual growth of interest. 'Made an interest' is not standard. 'Grew an interest' is not idiomatic in English."},
  {s:"Verb Collocation",t:"The new policy … a significant impact on local businesses.",o:["had","made","did"],c:0,e:"'Have an impact' is the standard collocation. 'Make an impact' is also used but 'have' is stronger when referring to effect. 'Do an impact' is not a valid collocation."},
  {s:"Adjective Collocation",t:"After the storm, the town was in … disarray.",o:["complete","total","utter"],c:2,e:"'Utter disarray' is the most natural collocate — 'utter' intensifies abstract nouns expressing disorder. 'Complete disarray' is also natural. 'Total disarray' is less common. All three can work, but 'utter' is the most idiomatic C1 choice here."},
  {s:"Noun Collocation",t:"He … the blame for the project's failure.",o:["took","made","got"],c:0,e:"'Take the blame' is the standard collocation meaning to accept responsibility for something negative. 'Make the blame' and 'got the blame' are not standard — though 'get the blame' is used informally ('he got the blame' = was blamed by others)."},
  {s:"Verb Collocation",t:"The government plans to … measures to tackle rising unemployment.",o:["introduce","apply","do"],c:0,e:"'Introduce measures' is the natural collocation for proposing and putting new policies in place. 'Apply measures' can work in some contexts. 'Do measures' is not a valid collocation."},
  {s:"Adjective Collocation",t:"The report provided … evidence of financial misconduct.",o:["overwhelming","strong","heavy"],c:0,e:"'Overwhelming evidence' means so much evidence that it cannot be disputed. 'Strong evidence' is also natural. 'Heavy evidence' is not a standard collocation — 'heavy' collocates with traffic, rain, accent, etc."},
  {s:"Noun Collocation",t:"She … a point about the need for better communication.",o:["made","raised","did"],c:1,e:"'Raise a point' means to bring up a topic in a discussion — the most natural collocation here. 'Make a point' means to argue something clearly. Both work, but 'raised' is more appropriate when introducing a new topic."},
  {s:"Verb Collocation",t:"They … an agreement after hours of negotiations.",o:["reached","made","did"],c:0,e:"'Reach an agreement' is the standard collocation — it implies achieving consensus after effort. 'Make an agreement' is also used informally. 'Do an agreement' is not a valid collocation."},
  {s:"Adjective Collocation",t:"The situation is … improving, but there is still a long way to go.",o:["gradually","slowly","rapidly"],c:0,e:"'Gradually improving' means improving little by little over time — the most natural adverb here given 'still a long way to go'. 'Slowly improving' is similar. 'Rapidly improving' contradicts the idea that there is still a long way to go."},
  {s:"Noun Collocation",t:"He … a speech at the annual awards ceremony.",o:["gave","made","did"],c:0,e:"'Give a speech' is the standard collocation. 'Make a speech' is also acceptable in some contexts. 'Do a speech' is not a standard collocation."},
  {s:"Verb Collocation",t:"The company … a merger with its biggest competitor last year.",o:["underwent","did","made"],c:0,e:"'Undergo a merger' means to go through the process of merging — formal and correct. 'Do a merger' is informal. 'Make a merger' is not standard in business English."},
  {s:"Adjective Collocation",t:"He has … experience in project management.",o:["extensive","wide","broad"],c:0,e:"'Extensive experience' means a large amount of experience across many areas. 'Broad experience' is also natural. 'Wide experience' is possible but less common. 'Extensive' is the most frequently collocated adjective in formal contexts."},
  {s:"Noun Collocation",t:"She … a complaint about the poor service at the hotel.",o:["made","raised","did"],c:0,e:"'Make a complaint' is the standard fixed collocation. 'Raise a complaint' is also used in formal contexts. 'Do a complaint' is not a valid collocation."},
  {s:"Verb Collocation",t:"The new CEO … a radical change in company culture.",o:["brought about","brought in","brought up"],c:0,e:"'Bring about a change' means to cause something to happen. 'Bring in' means to introduce (a law, policy, or person). 'Bring up' means to raise a topic or a child — none of these directly cause a change."},
  {s:"Adjective Collocation",t:"The documentary shed … light on the corruption within the organisation.",o:["new","fresh","bright"],c:1,e:"'Shed fresh light on' is the idiomatic expression meaning to give new insight into something. 'Shed new light on' is also used. 'Shed bright light on' is not a standard idiom."},
  {s:"Verb Collocation",t:"She … a lot of pressure from her family to find a stable job.",o:["faced","had","made"],c:0,e:"'Face pressure' means to deal with or confront pressure from external sources. 'Had pressure' is grammatically weaker. 'Made pressure' is not a valid collocation."},
  {s:"Noun Collocation",t:"The government's decision drew … criticism from opposition leaders.",o:["sharp","strong","high"],c:0,e:"'Draw sharp criticism' is a natural collocation — 'sharp' collocates well with criticism, remarks, and rebukes. 'Strong criticism' is also natural. 'High criticism' is not a standard collocation."}
];
let cq=0,ans={},ansd={};
function init(){render();showC(0)}
function render(){const con=document.getElementById('qcon');con.innerHTML='';const L=['a','b','c'];const tot=Q.length;Q.forEach((q,qi)=>{const opts=q.o.map((o,oi)=>`<div class="opt" id="o${qi}-${oi}" onclick="pick(${qi},${oi})"><span class="ol">${L[oi]}</span><span>${o}</span></div>`).join('');const isL=qi===tot-1;con.innerHTML+=`<div class="qc" id="qc${qi}"><div class="qm">Question ${qi+1} of ${tot} &nbsp;·&nbsp; ${q.s}</div><div class="qt">${q.t}</div><div class="opts">${opts}</div><div class="fb" id="fb${qi}"></div><div class="qnav"><button class="btn bbk" onclick="nav(-1)" ${qi===0?'disabled':''}>← Back</button>${isL?`<button class="btn bnx" id="nn${qi}" disabled style="display:none">Next →</button><button class="btn bfn" id="nf${qi}" onclick="showRes()" style="display:none">See Results</button>`:`<button class="btn bnx" id="nn${qi}" onclick="nav(1)" disabled>Next →</button>`}</div></div>`;});}
function showC(i){document.querySelectorAll('.qc').forEach(c=>c.classList.remove('active'));document.getElementById('qc'+i).classList.add('active');cq=i;document.getElementById('pb').style.width=((i+1)/Q.length*100)+'%';if(ansd[i]!==undefined)rNav(i)}
function rNav(qi){const isL=qi===Q.length-1;const nn=document.getElementById('nn'+qi);const nf=document.getElementById('nf'+qi);if(isL){nn.style.display='none';nf.style.display='inline-block'}else nn.disabled=false}
function pick(qi,oi){if(ansd[qi]!==undefined)return;ans[qi]=oi;ansd[qi]=true;const q=Q[qi];const L=['a','b','c'];q.o.forEach((_,i)=>{const el=document.getElementById('o'+qi+'-'+i);el.classList.add('dis');if(i===oi&&oi===q.c)el.classList.add('cor');else if(i===oi)el.classList.add('wrn');else if(i===q.c)el.classList.add('rev')});const fb=document.getElementById('fb'+qi);const ok=oi===q.c;fb.className='fb show '+(ok?'fbok':'fbfl');fb.innerHTML=`<strong>${ok?'✓ Correct!':'✗ Wrong — Correct: '+L[q.c]+') '+q.o[q.c]}</strong><br>${q.e}`;rNav(qi);}
function nav(d){const n=cq+d;if(n<0||n>=Q.length)return;showC(n)}
function showRes(){document.querySelectorAll('.qc').forEach(c=>c.style.display='none');document.getElementById('results').style.display='block';document.getElementById('pb').style.width='100%';let cor=0;const sm={};Q.forEach((q,qi)=>{const ok=ans[qi]===q.c;if(ok)cor++;if(!sm[q.s])sm[q.s]={c:0,t:0};sm[q.s].t++;if(ok)sm[q.s].c++});const pct=Math.round(cor/Q.length*100);const lv=lvl(pct);document.getElementById('rn').textContent=cor;document.getElementById('rd').textContent='/ '+Q.length;const rb=document.getElementById('rb');rb.textContent=lv.l;rb.className='lb l'+lv.l.toLowerCase();document.getElementById('rt').textContent='Estimated level: '+lv.l+' ('+pct+'%)';document.getElementById('rde').textContent=lv.d;document.getElementById('rsk').innerHTML=Object.entries(sm).map(([k,v])=>`<div class="sb"><div class="sl">${k}</div><div class="sv">${v.c}/${v.t}</div></div>`).join('');const L=['a','b','c'];document.getElementById('ran').innerHTML=Q.map((q,qi)=>{const ua=ans[qi];const ok=ua===q.c;const ch=(ua!==undefined&&ua>=0)?L[ua]+') '+q.o[ua]:'—';return`<div class="ai ${ok?'aok':'afl'}"><div class="aih"><span class="aiq">Q${qi+1}: ${q.t}</span><span class="aib">${ok?'✓':'✗'}</span></div>${!ok?`<div class="aid">Your answer: <strong>${ch}</strong> · Correct: <strong>${L[q.c]}) ${q.o[q.c]}</strong></div>`:''}<div class="aid">${q.e}</div><div class="ais">${q.s}</div></div>`}).join('');}
function lvl(p){if(p<40)return{l:'A2',d:'Elementary. Collocations need a lot of focused study.'};if(p<55)return{l:'B1',d:'Intermediate. Basic collocations are ok — C1 level combinations need work.'};if(p<70)return{l:'B2',d:'Upper-Intermediate. Good command with some gaps in fixed collocations.'};if(p<85)return{l:'C1',d:'Advanced. Strong grasp of vocabulary collocations.'};return{l:'C2',d:'Proficient. Excellent command of English collocations.'}}
function restart(){ans={};ansd={};document.getElementById('results').style.display='none';document.querySelectorAll('.qc').forEach(c=>c.style.display='');render();showC(0)}
window.onload=init;
</script>
</body>
