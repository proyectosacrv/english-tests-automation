<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>15. Idiomatic Expressions — C1</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}header{background:#1a365d;color:white;padding:20px 32px}header h1{font-size:1.3rem;font-weight:700}header p{opacity:.75;font-size:.85rem;margin-top:3px}.pw{background:#bee3f8;height:5px}.pb{background:#4299e1;height:5px;transition:width .3s}main{max-width:740px;margin:0 auto;padding:28px 16px}.qc{background:white;border-radius:12px;padding:26px 30px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:20px;display:none}.qc.active{display:block}.qm{font-size:.74rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}.qt{font-size:1.02rem;line-height:1.65;margin-bottom:18px;font-weight:500}.opts{display:flex;flex-direction:column;gap:9px}.opt{padding:11px 15px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .13s;font-size:.95rem;display:flex;align-items:center;gap:10px}.opt:hover:not(.dis){border-color:#4299e1;background:#ebf8ff}.opt.cor{border-color:#38a169;background:#f0fff4;color:#276749;font-weight:600}.opt.wrn{border-color:#e53e3e;background:#fff5f5;color:#c53030}.opt.rev{border-color:#38a169;background:#f0fff4;color:#276749;font-weight:600}.opt.dis{cursor:default}.ol{width:25px;height:25px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700;flex-shrink:0}.fb{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:.88rem;line-height:1.55;display:none}.fb.show{display:block}.fbok{background:#f0fff4;border:1px solid #9ae6b4;color:#276749}.fbfl{background:#fff5f5;border:1px solid #feb2b2;color:#c53030}.qnav{display:flex;justify-content:space-between;margin-top:18px}.btn{padding:9px 20px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer}.btn:disabled{opacity:.35;cursor:default}.bbk{background:#e2e8f0;color:#4a5568}.bnx{background:#2b6cb0;color:white}.bfn{background:#38a169;color:white}#results{display:none;background:white;border-radius:12px;padding:32px;box-shadow:0 2px 10px rgba(0,0,0,.08)}.sc{width:118px;height:118px;border-radius:50%;border:8px solid #2b6cb0;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px}.sn{font-size:2rem;font-weight:800;color:#2b6cb0;line-height:1}.sd{font-size:.82rem;color:#718096}.lb{display:inline-block;padding:5px 16px;border-radius:20px;font-weight:700;font-size:.95rem}.la2{background:#feebc8;color:#c05621}.lb1{background:#fefcbf;color:#744210}.lb2{background:#c6f6d5;color:#276749}.lc1{background:#bee3f8;color:#2c5282}.lc2{background:#e9d8fd;color:#553c9a}.rs{text-align:center;margin-bottom:28px}.rs h2{font-size:1.2rem;margin-bottom:6px}.rs p{color:#718096;font-size:.92rem;line-height:1.6}.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0 24px}.sb{background:#f7fafc;border-radius:8px;padding:12px;text-align:center}.sl{font-size:.76rem;color:#718096}.sv{font-size:1.15rem;font-weight:700;color:#2b6cb0}.ah{font-size:.83rem;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e2e8f0;padding-bottom:6px;margin-bottom:12px}.ai{padding:12px 14px;border-radius:8px;margin-bottom:8px;border-left:4px solid}.aok{border-color:#38a169;background:#f0fff4}.afl{border-color:#e53e3e;background:#fff5f5}.aih{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px}.aiq{font-size:.85rem;color:#4a5568;flex:1}.aib{font-size:.72rem;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}.aok .aib{background:#9ae6b4;color:#276749}.afl .aib{background:#feb2b2;color:#c53030}.aid{font-size:.8rem;color:#718096;margin-top:3px}.ais{font-size:.73rem;color:#a0aec0;margin-top:2px}.br{width:100%;margin-top:20px;padding:12px;background:#2b6cb0;color:white;border:none;border-radius:8px;font-size:.97rem;font-weight:600;cursor:pointer}</style>
</head>
<body>
<header>
  <h1>15. Advanced English Grammar Test — C1</h1>
  <p>Choose the correct option · 20 questions · Idiomatic Expressions</p>
</header>
<div class="pw"><div class="pb" id="pb" style="width:5%"></div></div>
<main>
  <div id="qcon"></div>
  <div id="results">
    <div class="rs">
      <div class="sc"><span class="sn" id="rn"></span><span class="sd" id="rd"></span></div>
      <h2><span id="rb"></span></h2>
      <p id="rt"></p>
      <p id="rde"></p>
    </div>
    <div class="sg" id="rsk"></div>
    <div class="ah">Question-by-question analysis</div>
    <div id="ran"></div>
    <button class="br" onclick="restart()">↺ Restart Test</button>
  </div>
</main>
<script>
const Q=[
  {s:"bite the bullet",t:"The surgery will be painful, but you'll just have to … and get it over with.",o:["face the music","bite the bullet","break the ice"],c:1,e:"'Bite the bullet' means to endure a painful or unpleasant situation with courage. It does not relate to facing consequences ('face the music') or starting social interaction ('break the ice')."},
  {s:"beat around the bush",t:"Stop … and tell me directly what you think went wrong.",o:["burning bridges","beating around the bush","cutting corners"],c:1,e:"'Beat around the bush' means to avoid getting to the main point. 'Burning bridges' means destroying relationships, and 'cutting corners' means doing something poorly to save time."},
  {s:"hit the nail on the head",t:"When she said the project lacked clear leadership, she really …",o:["spilled the beans","got the ball rolling","hit the nail on the head"],c:2,e:"'Hit the nail on the head' means to describe exactly what is right or true about something. It implies precise accuracy in an observation or statement."},
  {s:"cost an arm and a leg",t:"I wanted to buy that designer jacket, but it … — nearly £800!",o:["cost an arm and a leg","was up in the air","went back to square one"],c:0,e:"'Cost an arm and a leg' means to be extremely expensive. The other idioms refer to uncertainty ('up in the air') and starting over ('back to square one')."},
  {s:"get the ball rolling",t:"Someone needs to … on the new project — we have been waiting weeks already.",o:["let the cat out of the bag","get the ball rolling","read between the lines"],c:1,e:"'Get the ball rolling' means to start an activity or process. 'Let the cat out of the bag' means to reveal a secret, and 'read between the lines' means to find hidden meaning."},
  {s:"in hot water",t:"The CEO found himself … after the press revealed he had misled shareholders.",o:["on the fence","in hot water","under the weather"],c:1,e:"'In hot water' means to be in trouble or difficulty, usually due to one's own actions. 'On the fence' means undecided, and 'under the weather' means feeling ill."},
  {s:"pull someone's leg",t:"He said the company was closing down, but don't worry — he was just …",o:["pulling your leg","spilling the beans","burning bridges"],c:0,e:"'Pull someone's leg' means to joke or tease someone by telling them something untrue. It is a common informal idiom for lighthearted deception."},
  {s:"ring a bell",t:"The name of that restaurant … — didn't we go there for your birthday last year?",o:["rings a bell","lets the cat out","sits on the fence"],c:0,e:"'Ring a bell' means to sound familiar or trigger a memory. 'Let the cat out of the bag' means to reveal a secret, and 'sit on the fence' means to be undecided."},
  {s:"spill the beans",t:"Please don't … about the surprise party — Maria must not find out.",o:["take it with a pinch of salt","spill the beans","go back to square one"],c:1,e:"'Spill the beans' means to reveal secret or confidential information, often accidentally. The idiom emphasises the accidental or premature disclosure of a secret."},
  {s:"take with a pinch of salt",t:"His claims about his sales record should be taken … — the numbers don't add up.",o:["with a pinch of salt","on the fence","up in the air"],c:0,e:"'Take with a pinch of salt' means to be sceptical about something, not to believe it completely. It implies caution about accepting information at face value."},
  {s:"under the weather",t:"I won't be coming into the office today — I've been feeling … since yesterday.",o:["on the fence","up in the air","under the weather"],c:2,e:"'Under the weather' means to feel slightly ill or unwell. It is commonly used as a polite and informal way to explain absence due to sickness."},
  {s:"up in the air",t:"The date of the product launch is still … — the team hasn't made a decision yet.",o:["back to square one","up in the air","on the fence"],c:1,e:"'Up in the air' means uncertain or undecided. 'Back to square one' means starting over from the beginning, and 'on the fence' means being undecided about a personal opinion."},
  {s:"go back to square one",t:"The prototype failed the safety tests, so the engineers had to …",o:["burn their bridges","go back to square one","let the cat out of the bag"],c:1,e:"'Go back to square one' means to start over from the beginning because the current approach has failed. It originates from early board games."},
  {s:"read between the lines",t:"Her email sounded polite, but if you … it's clear she's very unhappy with the result.",o:["read between the lines","hit the nail on the head","bite the bullet"],c:0,e:"'Read between the lines' means to understand the hidden or implied meaning in something, beyond what is literally stated."},
  {s:"let the cat out of the bag",t:"It was supposed to be a secret merger, but a journalist … before the official announcement.",o:["cut corners","let the cat out of the bag","got the ball rolling"],c:1,e:"'Let the cat out of the bag' means to accidentally or prematurely reveal a secret. The other idioms relate to doing work poorly and starting something."},
  {s:"cut corners",t:"The building collapsed because the construction firm had been … on materials to save money.",o:["cutting corners","burning bridges","beating around the bush"],c:0,e:"'Cut corners' means to do something the easiest or cheapest way, sacrificing quality or thoroughness. It often implies negligence or unethical shortcuts."},
  {s:"burn bridges",t:"Even if you disagree with your manager, be careful not to … — you may need a reference.",o:["burn your bridges","spill the beans","bite the bullet"],c:0,e:"'Burn bridges' (or 'burn your bridges') means to permanently damage a relationship or eliminate future opportunities, usually through careless or hostile action."},
  {s:"break the ice",t:"To … at the conference, the host suggested a short team-building activity.",o:["go back to square one","pull everyone's leg","break the ice"],c:2,e:"'Break the ice' means to do or say something to relieve tension or awkwardness in a social situation and make people feel more comfortable."},
  {s:"on the fence",t:"Many voters remain … on the issue of nuclear energy, seeing merit in both arguments.",o:["under the weather","on the fence","up in the air"],c:1,e:"'On the fence' means to be undecided or neutral about an issue, refusing to commit to one side. It is often used in political or social debate contexts."},
  {s:"sit on the fence",t:"The politician was criticised for … instead of taking a clear stance on the tax reform bill.",o:["letting the cat out","sitting on the fence","reading between the lines"],c:1,e:"'Sit on the fence' means to avoid making a decision or committing to one side of an argument. It is closely related to 'on the fence' and often used in political contexts."}
];
function lvl(p){if(p<40)return{l:"A2",d:"Idioms require exposure. Start reading and listening to authentic English materials."};if(p<55)return{l:"B1",d:"You recognise some common idioms. Build your range with graded readers and podcasts."};if(p<70)return{l:"B2",d:"Good idiomatic knowledge. Focus on context — many idioms overlap in meaning."};if(p<85)return{l:"C1",d:"Strong command of C1 idioms. Review the ones you missed for nuance."};return{l:"C2",d:"Excellent! Near-native command of idiomatic English in context."};}
let cq=0,ans={},ansd={};
function init(){render();showC(0)}
function render(){const con=document.getElementById('qcon');con.innerHTML='';const L=['a','b','c'];const tot=Q.length;Q.forEach((q,qi)=>{const opts=q.o.map((o,oi)=>`<div class="opt" id="o${qi}-${oi}" onclick="pick(${qi},${oi})"><span class="ol">${L[oi]}</span><span>${o}</span></div>`).join('');const isL=qi===tot-1;con.innerHTML+=`<div class="qc" id="qc${qi}"><div class="qm">Question ${qi+1} of ${tot} &nbsp;·&nbsp; ${q.s}</div><div class="qt">${q.t}</div><div class="opts">${opts}</div><div class="fb" id="fb${qi}"></div><div class="qnav"><button class="btn bbk" onclick="nav(-1)" ${qi===0?'disabled':''}>← Back</button>${isL?`<button class="btn bnx" id="nn${qi}" disabled style="display:none">Next →</button><button class="btn bfn" id="nf${qi}" onclick="showRes()" style="display:none">See Results</button>`:`<button class="btn bnx" id="nn${qi}" onclick="nav(1)" disabled>Next →</button>`}</div></div>`;});}
function showC(i){document.querySelectorAll('.qc').forEach(c=>c.classList.remove('active'));document.getElementById('qc'+i).classList.add('active');cq=i;document.getElementById('pb').style.width=((i+1)/Q.length*100)+'%';if(ansd[i]!==undefined)rNav(i)}
function rNav(qi){const isL=qi===Q.length-1;const nn=document.getElementById('nn'+qi);const nf=document.getElementById('nf'+qi);if(isL){nn.style.display='none';nf.style.display='inline-block'}else nn.disabled=false}
function pick(qi,oi){if(ansd[qi]!==undefined)return;ans[qi]=oi;ansd[qi]=true;const q=Q[qi];const L=['a','b','c'];q.o.forEach((_,i)=>{const el=document.getElementById('o'+qi+'-'+i);el.classList.add('dis');if(i===oi&&oi===q.c)el.classList.add('cor');else if(i===oi)el.classList.add('wrn');else if(i===q.c)el.classList.add('rev')});const fb=document.getElementById('fb'+qi);const ok=oi===q.c;fb.className='fb show '+(ok?'fbok':'fbfl');fb.innerHTML=`<strong>${ok?'✓ Correct!':'✗ Wrong — Correct: '+L[q.c]+') '+q.o[q.c]}</strong><br>${q.e}`;rNav(qi);}
function nav(d){const n=cq+d;if(n<0||n>=Q.length)return;showC(n)}
function showRes(){document.querySelectorAll('.qc').forEach(c=>c.style.display='none');document.getElementById('results').style.display='block';document.getElementById('pb').style.width='100%';let cor=0;const sm={};Q.forEach((q,qi)=>{const ok=ans[qi]===q.c;if(ok)cor++;if(!sm[q.s])sm[q.s]={c:0,t:0};sm[q.s].t++;if(ok)sm[q.s].c++});const pct=Math.round(cor/Q.length*100);const lv=lvl(pct);document.getElementById('rn').textContent=cor;document.getElementById('rd').textContent='/ '+Q.length;const rb=document.getElementById('rb');rb.textContent=lv.l;rb.className='lb l'+lv.l.toLowerCase();document.getElementById('rt').textContent='Estimated level: '+lv.l+' ('+pct+'%)';document.getElementById('rde').textContent=lv.d;document.getElementById('rsk').innerHTML=Object.entries(sm).map(([k,v])=>`<div class="sb"><div class="sl">${k}</div><div class="sv">${v.c}/${v.t}</div></div>`).join('');const L=['a','b','c'];document.getElementById('ran').innerHTML=Q.map((q,qi)=>{const ua=ans[qi];const ok=ua===q.c;const ch=(ua!==undefined&&ua>=0)?L[ua]+') '+q.o[ua]:'—';return`<div class="ai ${ok?'aok':'afl'}"><div class="aih"><span class="aiq">Q${qi+1}: ${q.t}</span><span class="aib">${ok?'✓':'✗'}</span></div>${!ok?`<div class="aid">Your answer: <strong>${ch}</strong> · Correct: <strong>${L[q.c]}) ${q.o[q.c]}</strong></div>`:''}<div class="aid">${q.e}</div><div class="ais">${q.s}</div></div>`}).join('');}
function restart(){ans={};ansd={};document.getElementById('results').style.display='none';document.querySelectorAll('.qc').forEach(c=>c.style.display='');render();showC(0)}
window.onload=init;
</script>
</body>
</html>
