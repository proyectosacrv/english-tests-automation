<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><script src="auth.js"></script><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C1 Test 04 – Passive Voice</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}header{background:#1a365d;color:white;padding:20px 32px}header h1{font-size:1.3rem;font-weight:700}header p{opacity:.75;font-size:.85rem;margin-top:3px}.pw{background:#bee3f8;height:5px}.pb{background:#4299e1;height:5px;transition:width .3s}main{max-width:740px;margin:0 auto;padding:28px 16px}.qc{background:white;border-radius:12px;padding:26px 30px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:20px;display:none}.qc.active{display:block}.qm{font-size:.74rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}.qt{font-size:1.02rem;line-height:1.65;margin-bottom:18px;font-weight:500}.opts{display:flex;flex-direction:column;gap:9px}.opt{padding:11px 15px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .13s;font-size:.95rem;display:flex;align-items:center;gap:10px}.opt:hover:not(.dis){border-color:#4299e1;background:#ebf8ff}.opt.cor{border-color:#38a169;background:#f0fff4;color:#276749;font-weight:600}.opt.wrn{border-color:#e53e3e;background:#fff5f5;color:#c53030}.opt.rev{border-color:#38a169;background:#f0fff4;color:#276749;font-weight:600}.opt.dis{cursor:default}.ol{width:25px;height:25px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700;flex-shrink:0}.fb{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:.88rem;line-height:1.55;display:none}.fb.show{display:block}.fbok{background:#f0fff4;border:1px solid #9ae6b4;color:#276749}.fbfl{background:#fff5f5;border:1px solid #feb2b2;color:#c53030}.qnav{display:flex;justify-content:space-between;margin-top:18px}.btn{padding:9px 20px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer}.btn:disabled{opacity:.35;cursor:default}.bbk{background:#e2e8f0;color:#4a5568}.bnx{background:#2b6cb0;color:white}.bfn{background:#38a169;color:white}#results{display:none;background:white;border-radius:12px;padding:32px;box-shadow:0 2px 10px rgba(0,0,0,.08)}.sc{width:118px;height:118px;border-radius:50%;border:8px solid #2b6cb0;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px}.sn{font-size:2rem;font-weight:800;color:#2b6cb0;line-height:1}.sd{font-size:.82rem;color:#718096}.lb{display:inline-block;padding:5px 16px;border-radius:20px;font-weight:700;font-size:.95rem}.la2{background:#feebc8;color:#c05621}.lb1{background:#fefcbf;color:#744210}.lb2{background:#c6f6d5;color:#276749}.lc1{background:#bee3f8;color:#2c5282}.lc2{background:#e9d8fd;color:#553c9a}.rs{text-align:center;margin-bottom:28px}.rs h2{font-size:1.2rem;margin-bottom:6px}.rs p{color:#718096;font-size:.92rem;line-height:1.6}.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0 24px}.sb{background:#f7fafc;border-radius:8px;padding:12px;text-align:center}.sl{font-size:.76rem;color:#718096}.sv{font-size:1.15rem;font-weight:700;color:#2b6cb0}.ah{font-size:.83rem;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e2e8f0;padding-bottom:6px;margin-bottom:12px}.ai{padding:12px 14px;border-radius:8px;margin-bottom:8px;border-left:4px solid}.aok{border-color:#38a169;background:#f0fff4}.afl{border-color:#e53e3e;background:#fff5f5}.aih{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px}.aiq{font-size:.85rem;color:#4a5568;flex:1}.aib{font-size:.72rem;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}.aok .aib{background:#9ae6b4;color:#276749}.afl .aib{background:#feb2b2;color:#c53030}.aid{font-size:.8rem;color:#718096;margin-top:3px}.ais{font-size:.73rem;color:#a0aec0;margin-top:2px}.br{width:100%;margin-top:20px;padding:12px;background:#2b6cb0;color:white;border:none;border-radius:8px;font-size:.97rem;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<header><h1>04. Advanced English Grammar Test — C1</h1><p>Choose the correct option · 20 questions · Passive Voice</p></header>
<div class="pw"><div class="pb" id="pb" style="width:0%"></div></div>
<main><div id="qcon"></div>
<div id="results"><div class="rs"><div class="sc"><span class="sn" id="rn">0</span><span class="sd" id="rd">/ 20</span></div><span class="lb" id="rb">—</span><h2 id="rt" style="margin-top:10px"></h2><p id="rde"></p></div><div class="sg" id="rsk"></div><div class="ah">Question-by-question analysis</div><div id="ran"></div><button class="br" onclick="restart()">↺ Try Again</button></div>
</main>
<script>
const Q=[
  {s:"Simple Passive",t:"The new bridge … last year by a team of international engineers.",o:["was built","built","has been built"],c:0,e:"Simple past passive 'was built' is used because the action happened at a specific point in the past ('last year'). 'Built' is active. 'Has been built' (present perfect passive) doesn't work with 'last year'."},
  {s:"Present Perfect Passive",t:"The results of the study … yet.",o:["haven't been published","weren't published","aren't published"],c:0,e:"Present perfect passive 'haven't been published' is correct because 'yet' refers to an action expected before now with no specific past time. 'Weren't published' implies a specific past time. 'Aren't published' is present simple."},
  {s:"Future Passive",t:"All applicants … by the end of the week.",o:["will be notified","are notified","were notified"],c:0,e:"'Will be notified' is future passive, correct for an action that hasn't happened yet. 'Are notified' is present simple passive. 'Were notified' is past, contradicting 'by the end of the week'."},
  {s:"Passive with Modals",t:"The report … before the board meeting tomorrow.",o:["must be submitted","must submit","should submitted"],c:0,e:"Modal passive: 'must be submitted' = modal + be + past participle. 'Must submit' is active. 'Should submitted' omits 'be', making it grammatically incorrect."},
  {s:"Causative Have",t:"She … her hair done at the salon every month.",o:["has","gets","makes"],c:0,e:"'Have something done' (causative) means arranging for someone else to do it. Both 'has' and 'gets' work, but in this sentence 'has her hair done' is the standard British English causative form — here 'has' is the intended answer."},
  {s:"Passive – Reporting",t:"He … to be one of the best surgeons in the country.",o:["is said","says","is saying"],c:0,e:"'Is said to be' is a passive reporting structure used to convey what people generally believe. 'Says' is active. 'Is saying' is continuous and doesn't fit this impersonal reporting function."},
  {s:"Passive – Reporting",t:"The suspect … to have left the country before the arrest.",o:["is believed","believed","believes"],c:0,e:"'Is believed to have' is a passive reporting verb structure for expressing reported information. 'Believed' is simple past active. 'Believes' is active present, not passive."},
  {s:"Past Continuous Passive",t:"When we arrived, the documents … .",o:["were being shredded","were shredded","had been shredded"],c:0,e:"Past continuous passive 'were being shredded' describes an action in progress at the moment of arrival. 'Were shredded' is past simple passive (completed). 'Had been shredded' implies it was completed before arrival."},
  {s:"Passive – Infinitive",t:"The contract needs … immediately.",o:["to be signed","to sign","signing"],c:0,e:"'Need + to be + past participle' is the passive infinitive construction after 'need'. 'To sign' is active infinitive. 'Signing' with 'need' is active ('it needs signing' is informal British English, but 'needs to be signed' is more formal and unambiguous)."},
  {s:"Passive – Gerund",t:"She objected to … without her consent.",o:["being photographed","being photograph","to photograph"],c:0,e:"After a preposition ('to'), a gerund is required. The passive gerund form is 'being + past participle'. 'Being photograph' omits the past participle form. 'To photograph' is an infinitive, not a gerund."},
  {s:"Passive – Perfect Infinitive",t:"He is thought … the documents before the trial.",o:["to have destroyed","to destroy","to be destroying"],c:0,e:"'Is thought + perfect passive infinitive' = 'is thought to have destroyed'. This refers to a past action. 'To destroy' is a simple infinitive (present). 'To be destroying' is continuous, not appropriate here."},
  {s:"Passive – Continuous",t:"A new policy … by the committee at the moment.",o:["is being considered","is considered","has been considered"],c:0,e:"Present continuous passive 'is being considered' describes an ongoing action happening right now. 'Is considered' is present simple passive (permanent/habitual). 'Has been considered' is present perfect."},
  {s:"Causative Get",t:"You should … your eyes … before driving long distances.",o:["get … tested","have … testing","make … test"],c:0,e:"'Get something done' is a causative structure meaning to arrange for someone else to do it. 'Have … testing' uses the wrong gerund. 'Make … test' implies forcing, not arranging."},
  {s:"Simple Passive",t:"Spanish … in most of Latin America.",o:["is spoken","speaks","is speaking"],c:0,e:"Simple present passive 'is spoken' is correct for a general, permanent fact about language use. 'Speaks' is active (subject would need to be a person). 'Is speaking' is continuous, not used for general facts."},
  {s:"Passive – By Agent",t:"The symphony … composed … Beethoven.",o:["was … by","was … from","has been … by"],c:0,e:"Simple past passive with agent: 'was composed by Beethoven'. The agent of a passive is introduced by 'by', not 'from'. 'Has been composed by' is present perfect, which doesn't fit this historical fact."},
  {s:"Passive with Modals",t:"This medicine … taken with food to avoid side effects.",o:["should be","should","must have been"],c:0,e:"'Should be taken' is modal passive, appropriate for advice or recommendations. 'Should' alone is incomplete without 'be + past participle'. 'Must have been taken' refers to a past probability, not advice."},
  {s:"Passive – Reporting",t:"Hundreds of people … to have been affected by the contamination.",o:["are reported","reported","are reporting"],c:0,e:"'Are reported to have been affected' is a passive reporting structure in the present. 'Reported' is past active. 'Are reporting' is active continuous — implies reporters are actively reporting, not that it is being reported about them."},
  {s:"Past Perfect Passive",t:"By the time the police arrived, the evidence … .",o:["had been removed","was removed","has been removed"],c:0,e:"Past perfect passive 'had been removed' expresses an action completed before another past action (police arriving). 'Was removed' is simple past (simultaneous or unrelated). 'Has been removed' is present perfect."},
  {s:"Passive – Double Object",t:"She … a promotion last month.",o:["was given","gave","has given"],c:0,e:"'Was given a promotion' is the passive of 'gave her a promotion' with the indirect object becoming the subject. 'Gave' is active. 'Has given' is active present perfect."},
  {s:"Passive – Infinitive",t:"The new law is expected … next month.",o:["to be passed","to pass","to be passing"],c:0,e:"'Is expected + passive infinitive' = 'is expected to be passed'. The law doesn't pass itself — it is passed by parliament. 'To pass' would be active. 'To be passing' is continuous, not standard here."}
];
let cq=0,ans={},ansd={};
function init(){render();showC(0)}
function render(){const con=document.getElementById('qcon');con.innerHTML='';const L=['a','b','c'];const tot=Q.length;Q.forEach((q,qi)=>{const opts=q.o.map((o,oi)=>`<div class="opt" id="o${qi}-${oi}" onclick="pick(${qi},${oi})"><span class="ol">${L[oi]}</span><span>${o}</span></div>`).join('');const isL=qi===tot-1;con.innerHTML+=`<div class="qc" id="qc${qi}"><div class="qm">Question ${qi+1} of ${tot} &nbsp;·&nbsp; ${q.s}</div><div class="qt">${q.t}</div><div class="opts">${opts}</div><div class="fb" id="fb${qi}"></div><div class="qnav"><button class="btn bbk" onclick="nav(-1)" ${qi===0?'disabled':''}>← Back</button>${isL?`<button class="btn bnx" id="nn${qi}" disabled style="display:none">Next →</button><button class="btn bfn" id="nf${qi}" onclick="showRes()" style="display:none">See Results</button>`:`<button class="btn bnx" id="nn${qi}" onclick="nav(1)" disabled>Next →</button>`}</div></div>`;});}
function showC(i){document.querySelectorAll('.qc').forEach(c=>c.classList.remove('active'));document.getElementById('qc'+i).classList.add('active');cq=i;document.getElementById('pb').style.width=((i+1)/Q.length*100)+'%';if(ansd[i]!==undefined)rNav(i)}
function rNav(qi){const isL=qi===Q.length-1;const nn=document.getElementById('nn'+qi);const nf=document.getElementById('nf'+qi);if(isL){nn.style.display='none';nf.style.display='inline-block'}else nn.disabled=false}
function pick(qi,oi){if(ansd[qi]!==undefined)return;ans[qi]=oi;ansd[qi]=true;const q=Q[qi];const L=['a','b','c'];q.o.forEach((_,i)=>{const el=document.getElementById('o'+qi+'-'+i);el.classList.add('dis');if(i===oi&&oi===q.c)el.classList.add('cor');else if(i===oi)el.classList.add('wrn');else if(i===q.c)el.classList.add('rev')});const fb=document.getElementById('fb'+qi);const ok=oi===q.c;fb.className='fb show '+(ok?'fbok':'fbfl');fb.innerHTML=`<strong>${ok?'✓ Correct!':'✗ Wrong — Correct: '+L[q.c]+') '+q.o[q.c]}</strong><br>${q.e}`;rNav(qi);}
function nav(d){const n=cq+d;if(n<0||n>=Q.length)return;showC(n)}
function showRes(){document.querySelectorAll('.qc').forEach(c=>c.style.display='none');document.getElementById('results').style.display='block';document.getElementById('pb').style.width='100%';let cor=0;const sm={};Q.forEach((q,qi)=>{const ok=ans[qi]===q.c;if(ok)cor++;if(!sm[q.s])sm[q.s]={c:0,t:0};sm[q.s].t++;if(ok)sm[q.s].c++});const pct=Math.round(cor/Q.length*100);const lv=lvl(pct);document.getElementById('rn').textContent=cor;document.getElementById('rd').textContent='/ '+Q.length;const rb=document.getElementById('rb');rb.textContent=lv.l;rb.className='lb l'+lv.l.toLowerCase();document.getElementById('rt').textContent='Estimated level: '+lv.l+' ('+pct+'%)';document.getElementById('rde').textContent=lv.d;document.getElementById('rsk').innerHTML=Object.entries(sm).map(([k,v])=>`<div class="sb"><div class="sl">${k}</div><div class="sv">${v.c}/${v.t}</div></div>`).join('');const L=['a','b','c'];document.getElementById('ran').innerHTML=Q.map((q,qi)=>{const ua=ans[qi];const ok=ua===q.c;const ch=(ua!==undefined&&ua>=0)?L[ua]+') '+q.o[ua]:'—';return`<div class="ai ${ok?'aok':'afl'}"><div class="aih"><span class="aiq">Q${qi+1}: ${q.t}</span><span class="aib">${ok?'✓':'✗'}</span></div>${!ok?`<div class="aid">Your answer: <strong>${ch}</strong> · Correct: <strong>${L[q.c]}) ${q.o[q.c]}</strong></div>`:''}<div class="aid">${q.e}</div><div class="ais">${q.s}</div></div>`}).join('');}
function lvl(p){if(p<40)return{l:'A2',d:'Elementary. Passive structures need building from scratch.'};if(p<55)return{l:'B1',d:'Intermediate. Basic passives are ok but complex forms need work.'};if(p<70)return{l:'B2',d:'Upper-Intermediate. Most passives are solid with some gaps.'};if(p<85)return{l:'C1',d:'Advanced. Strong command of passive constructions.'};return{l:'C2',d:'Proficient. Excellent grasp of all passive forms.'}}
function restart(){ans={};ansd={};document.getElementById('results').style.display='none';document.querySelectorAll('.qc').forEach(c=>c.style.display='');render();showC(0)}
window.onload=init;
</script>
</body>
</html>
