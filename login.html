<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tests — Access</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:white;border-radius:16px;padding:48px 40px;box-shadow:0 4px 24px rgba(0,0,0,0.1);text-align:center;max-width:400px;width:100%;margin:16px}
.logo{font-size:2.5rem;margin-bottom:16px}
h1{font-size:1.4rem;font-weight:800;color:#1a365d;margin-bottom:8px}
p{color:#718096;font-size:0.92rem;line-height:1.6;margin-bottom:32px}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 20px;border:2px solid #e2e8f0;border-radius:10px;background:white;font-size:0.97rem;font-weight:600;color:#2d3748;cursor:pointer;transition:all 0.15s}
.btn-google:hover{border-color:#4299e1;background:#ebf8ff;color:#2b6cb0}
.btn-google svg{flex-shrink:0}
.error{margin-top:20px;padding:12px 16px;background:#fff5f5;border:1px solid #feb2b2;border-radius:8px;color:#c53030;font-size:0.88rem;display:none}
.error.show{display:block}
.checking{color:#a0aec0;font-size:0.85rem;margin-top:16px;display:none}
.checking.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📚</div>
  <h1>English Test Battery</h1>
  <p>Sign in with your Google account to access the tests. Access is restricted to authorised users.</p>
  <button class="btn-google" onclick="signIn()">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Sign in with Google
  </button>
  <div class="error" id="error"></div>
  <div class="checking" id="checking">Verifying access…</div>
</div>

<script>
const ALLOWED = [
  'proyectosacrv@gmail.com',
  'solgncd@gmail.com',
  'alexciuvi6@gmail.com'
];
const CLIENT_ID = '249569076351-h9g696r3i0sn02g2qkp9g7bn137uvo30.apps.googleusercontent.com';

// if already authenticated, redirect
const saved = sessionStorage.getItem('auth_email');
if (saved && ALLOWED.includes(saved.toLowerCase())) {
  const dest = sessionStorage.getItem('auth_dest') || 'index.html';
  window.location.href = dest;
}

function signIn() {
  document.getElementById('error').classList.remove('show');
  document.getElementById('checking').classList.add('show');
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/userinfo.email',
    callback: async (resp) => {
      if (resp.error) { showError('Sign-in error: ' + resp.error); return; }
      try {
        const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { 'Authorization': 'Bearer ' + resp.access_token }
        });
        const info = await r.json();
        const email = (info.email || '').toLowerCase();
        if (!ALLOWED.includes(email)) {
          showError(`Access denied for ${email}. Contact the administrator.`);
          return;
        }
        sessionStorage.setItem('auth_email', email);
        sessionStorage.setItem('auth_token', resp.access_token);
        sessionStorage.setItem('auth_name', info.name || email);
        const dest = sessionStorage.getItem('auth_dest') || 'index.html';
        window.location.href = dest;
      } catch(e) { showError('Verification error: ' + e.message); }
    }
  });
  client.requestAccessToken();
}

function showError(msg) {
  document.getElementById('checking').classList.remove('show');
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
}
</script>
</body>
</html>
