<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><script src="auth.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C1 Test 03 – Conditionals</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}
header{background:#1a365d;color:white;padding:20px 32px}
header h1{font-size:1.3rem;font-weight:700}
header p{opacity:.75;font-size:.85rem;margin-top:3px}
.pw{background:#bee3f8;height:5px}.pb{background:#4299e1;height:5px;transition:width .3s}
main{max-width:740px;margin:0 auto;padding:28px 16px}
.qc{background:white;border-radius:12px;padding:26px 30px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:20px;display:none}
.qc.active{display:block}
.qm{font-size:.74rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.qt{font-size:1.02rem;line-height:1.65;margin-bottom:18px;font-weight:500}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{padding:11px 15px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .13s;font-size:.95rem;display:flex;align-items:center;gap:10px}
.opt:hover:not(.dis){border-color:#4299e1;background:#ebf8ff}
.opt.cor{border-color:#38a169;background:#f0fff4;color:#276749;font-weight:600}
.opt.wrn{border-color:#e53e3e;background:#fff5f5;color:#c53030}
.opt.rev{border-color:#38a169;background:#f0fff4;color:#276749;font-weight:600}
.opt.dis{cursor:default}
.ol{width:25px;height:25px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700;flex-shrink:0}
.fb{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:.88rem;line-height:1.55;display:none}
.fb.show{display:block}
.fbok{background:#f0fff4;border:1px solid #9ae6b4;color:#276749}
.fbfl{background:#fff5f5;border:1px solid #feb2b2;color:#c53030}
.qnav{display:flex;justify-content:space-between;margin-top:18px}
.btn{padding:9px 20px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.35;cursor:default}
.bbk{background:#e2e8f0;color:#4a5568}.bnx{background:#2b6cb0;color:white}.bfn{background:#38a169;color:white}
#results{display:none;background:white;border-radius:12px;padding:32px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.sc{width:118px;height:118px;border-radius:50%;border:8px solid #2b6cb0;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px}
.sn{font-size:2rem;font-weight:800;color:#2b6cb0;line-height:1}.sd{font-size:.82rem;color:#718096}
.lb{display:inline-block;padding:5px 16px;border-radius:20px;font-weight:700;font-size:.95rem}
.la2{background:#feebc8;color:#c05621}.lb1{background:#fefcbf;color:#744210}.lb2{background:#c6f6d5;color:#276749}.lc1{background:#bee3f8;color:#2c5282}.lc2{background:#e9d8fd;color:#553c9a}
.rs{text-align:center;margin-bottom:28px}.rs h2{font-size:1.2rem;margin-bottom:6px}.rs p{color:#718096;font-size:.92rem;line-height:1.6}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0 24px}
.sb{background:#f7fafc;border-radius:8px;padding:12px;text-align:center}
.sl{font-size:.76rem;color:#718096}.sv{font-size:1.15rem;font-weight:700;color:#2b6cb0}
.ah{font-size:.83rem;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e2e8f0;padding-bottom:6px;margin-bottom:12px}
.ai{padding:12px 14px;border-radius:8px;margin-bottom:8px;border-left:4px solid}
.aok{border-color:#38a169;background:#f0fff4}.afl{border-color:#e53e3e;background:#fff5f5}
.aih{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px}
.aiq{font-size:.85rem;color:#4a5568;flex:1}
.aib{font-size:.72rem;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.aok .aib{background:#9ae6b4;color:#276749}.afl .aib{background:#feb2b2;color:#c53030}
.aid{font-size:.8rem;color:#718096;margin-top:3px}.ais{font-size:.73rem;color:#a0aec0;margin-top:2px}
.br{width:100%;margin-top:20px;padding:12px;background:#2b6cb0;color:white;border:none;border-radius:8px;font-size:.97rem;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<header>
  <h1>03. Advanced English Grammar Test — C1</h1>
  <p>Choose the correct option · 20 questions · Conditionals &amp; Wishes</p>
</header>
<div class="pw"><div class="pb" id="pb" style="width:0%"></div></div>
<main>
  <div id="qcon"></div>
  <div id="results">
    <div class="rs">
      <div class="sc"><span class="sn" id="rn">0</span><span class="sd" id="rd">/ 20</span></div>
      <span class="lb" id="rb">—</span>
      <h2 id="rt" style="margin-top:10px"></h2><p id="rde"></p>
    </div>
    <div class="sg" id="rsk"></div>
    <div class="ah">Question-by-question analysis</div>
    <div id="ran"></div>
    <button class="br" onclick="restart()">↺ Try Again</button>
  </div>
</main>
<script>
const Q=[
  {s:"2nd Conditional",t:"If I … the lottery, I would travel the world.",o:["won","win","had won"],c:0,e:"Second conditional uses 'If + past simple, would + infinitive' to describe hypothetical present/future situations. 'Win' is present tense; 'had won' belongs to the third conditional."},
  {s:"3rd Conditional",t:"If she … harder, she would have passed the exam.",o:["had studied","studied","has studied"],c:0,e:"Third conditional: 'If + past perfect, would have + past participle' — for unreal past situations. 'Studied' gives a second conditional. 'Has studied' is present perfect and doesn't fit."},
  {s:"Mixed Conditional",t:"If he … his degree, he would be working as an engineer now.",o:["had finished","finished","would finish"],c:0,e:"Mixed conditional: past perfect in the if-clause (unreal past cause) + would + infinitive in the main clause (present result). 'Finished' gives a second conditional. 'Would finish' can't go in the if-clause."},
  {s:"Zero Conditional",t:"If you … water to 100°C, it boils.",o:["heat","heated","would heat"],c:0,e:"Zero conditional uses present simple in both clauses to describe universal truths or scientific facts. 'Heated' (past simple) and 'would heat' are not used for general truths."},
  {s:"Inversion",t:"… I known the truth, I would never have agreed.",o:["Had","Would","Should"],c:0,e:"Formal inversion of third conditional: 'Had I known' = 'If I had known'. 'Would' cannot start a conditional if-clause. 'Should' is used for first conditional inversion ('Should you need help…')."},
  {s:"Inversion",t:"… you need any assistance, please don't hesitate to call.",o:["Should","Had","Would"],c:0,e:"'Should you need' is formal first conditional inversion, equivalent to 'If you should need'. 'Had' is for third conditional inversion. 'Would' cannot replace 'if' in a conditional."},
  {s:"Unless",t:"I won't sign the contract … I receive a written guarantee.",o:["unless","if","provided"],c:0,e:"'Unless' means 'except if' — fitting here because the action won't happen except under one condition. 'If' would make a positive condition. 'Provided' could work but 'provided that I receive' would be needed for correctness."},
  {s:"Wishes",t:"I wish I … speak French fluently — it would help my career enormously.",o:["could","can","will"],c:0,e:"'Wish + could' expresses a desire about a present ability that doesn't exist. 'Can' is present ability, not a wish. 'Will' is used for wishes about future behaviour ('I wish you would stop')."},
  {s:"Wishes",t:"She wishes she … accepted that job offer last year.",o:["had","has","would have"],c:0,e:"'Wish + past perfect' expresses regret about a past situation. 'Wish + has' is grammatically incorrect. 'Wish + would have' is not standard — past perfect is required."},
  {s:"Wishes",t:"I wish he … stop interrupting me every five minutes.",o:["would","could","had"],c:0,e:"'Wish + would' expresses dissatisfaction with someone's present behaviour and a desire for it to change. 'Could' is for ability. 'Had' is past perfect, used for regrets."},
  {s:"2nd Conditional",t:"What … you do if you found a wallet full of cash on the street?",o:["would","will","did"],c:0,e:"Second conditional main clause requires 'would + infinitive'. 'Will' is used in real/first conditionals. 'Did' is not used in the main clause of a conditional."},
  {s:"3rd Conditional",t:"He wouldn't have crashed the car if he … so fast.",o:["hadn't been driving","wasn't driving","didn't drive"],c:0,e:"Third conditional: 'hadn't been driving' (past perfect continuous) correctly describes an ongoing past action that caused the crash. 'Wasn't driving' and 'didn't drive' are past simple/continuous — used in second conditional."},
  {s:"Provided / As long as",t:"You can borrow the car … you return it by midnight.",o:["as long as","unless","if not"],c:0,e:"'As long as' introduces a condition meaning 'on the condition that'. 'Unless' means 'except if' and would reverse the logic. 'If not' creates a negative condition that doesn't fit."},
  {s:"Supposing",t:"… you lost your job tomorrow, what would you do?",o:["Supposing","Supposed","Suppose that"],c:0,e:"'Supposing' introduces a hypothetical conditional, equivalent to 'What if'. 'Supposed' is an adjective (supposed to). 'Suppose that' could work but 'supposing' alone is more natural here as a sentence opener."},
  {s:"If only",t:"If only I … more time — this project is overwhelming me.",o:["had","have","would have"],c:0,e:"'If only + past simple' expresses a strong wish about the present. 'Have' is present tense and can't follow 'if only' in this way. 'Would have' implies conditionality, not a simple wish."},
  {s:"Mixed Conditional",t:"If they … the warning signs, the disaster could have been avoided.",o:["had heeded","heeded","would heed"],c:0,e:"Third conditional if-clause requires past perfect: 'had heeded'. 'Heeded' is simple past (second conditional). 'Would heed' cannot go in the if-clause of a conditional."},
  {s:"But for",t:"… your help, I would never have finished on time.",o:["But for","Except for","Despite"],c:0,e:"'But for' means 'if it hadn't been for' — it introduces the condition that prevented or enabled an outcome. 'Except for' doesn't carry the same conditional meaning. 'Despite' is a contrast connector, not a conditional."},
  {s:"As long as",t:"The children can play outside … it doesn't rain.",o:["as long as","unless","even if"],c:0,e:"'As long as' states the condition under which the permission holds. 'Unless it doesn't rain' would be a double negative and illogical. 'Even if' concedes the condition rather than making it a requirement."},
  {s:"Inversion",t:"… the weather been better, we would have held the event outdoors.",o:["Had","Would","Should"],c:0,e:"Third conditional inversion: 'Had the weather been better' = 'If the weather had been better'. 'Would' can't start an if-clause. 'Should' is for first conditional inversion."},
  {s:"3rd Conditional",t:"She wouldn't have been so upset if you … her the truth from the start.",o:["had told","told","would tell"],c:0,e:"Third conditional if-clause: 'had told' (past perfect). 'Told' gives a second conditional. 'Would tell' cannot go in the if-clause — 'would' is reserved for the main clause."}
];
let cq=0,ans={},ansd={};
function init(){render();showC(0)}
function render(){
  const con=document.getElementById('qcon');con.innerHTML='';
  const L=['a','b','c'];const tot=Q.length;
  Q.forEach((q,qi)=>{
    const opts=q.o.map((o,oi)=>`<div class="opt" id="o${qi}-${oi}" onclick="pick(${qi},${oi})"><span class="ol">${L[oi]}</span><span>${o}</span></div>`).join('');
    const isL=qi===tot-1;
    con.innerHTML+=`<div class="qc" id="qc${qi}"><div class="qm">Question ${qi+1} of ${tot} &nbsp;·&nbsp; ${q.s}</div><div class="qt">${q.t}</div><div class="opts">${opts}</div><div class="fb" id="fb${qi}"></div><div class="qnav"><button class="btn bbk" onclick="nav(-1)" ${qi===0?'disabled':''}>← Back</button>${isL?`<button class="btn bnx" id="nn${qi}" disabled style="display:none">Next →</button><button class="btn bfn" id="nf${qi}" onclick="showRes()" style="display:none">See Results</button>`:`<button class="btn bnx" id="nn${qi}" onclick="nav(1)" disabled>Next →</button>`}</div></div>`;
  });
}
function showC(i){document.querySelectorAll('.qc').forEach(c=>c.classList.remove('active'));document.getElementById('qc'+i).classList.add('active');cq=i;document.getElementById('pb').style.width=((i+1)/Q.length*100)+'%';if(ansd[i]!==undefined)rNav(i)}
function rNav(qi){const isL=qi===Q.length-1;const nn=document.getElementById('nn'+qi);const nf=document.getElementById('nf'+qi);if(isL){nn.style.display='none';nf.style.display='inline-block'}else nn.disabled=false}
function pick(qi,oi){
  if(ansd[qi]!==undefined)return;ans[qi]=oi;ansd[qi]=true;
  const q=Q[qi];const L=['a','b','c'];
  q.o.forEach((_,i)=>{const el=document.getElementById('o'+qi+'-'+i);el.classList.add('dis');if(i===oi&&oi===q.c)el.classList.add('cor');else if(i===oi)el.classList.add('wrn');else if(i===q.c)el.classList.add('rev')});
  const fb=document.getElementById('fb'+qi);const ok=oi===q.c;
  fb.className='fb show '+(ok?'fbok':'fbfl');
  fb.innerHTML=`<strong>${ok?'✓ Correct!':'✗ Wrong — Correct: '+L[q.c]+') '+q.o[q.c]}</strong><br>${q.e}`;rNav(qi);
}
function nav(d){const n=cq+d;if(n<0||n>=Q.length)return;showC(n)}
function showRes(){
  document.querySelectorAll('.qc').forEach(c=>c.style.display='none');
  document.getElementById('results').style.display='block';
  document.getElementById('pb').style.width='100%';
  let cor=0;const sm={};
  Q.forEach((q,qi)=>{const ok=ans[qi]===q.c;if(ok)cor++;if(!sm[q.s])sm[q.s]={c:0,t:0};sm[q.s].t++;if(ok)sm[q.s].c++});
  const pct=Math.round(cor/Q.length*100);const lv=lvl(pct);
  document.getElementById('rn').textContent=cor;document.getElementById('rd').textContent='/ '+Q.length;
  const rb=document.getElementById('rb');rb.textContent=lv.l;rb.className='lb l'+lv.l.toLowerCase();
  document.getElementById('rt').textContent='Estimated level: '+lv.l+' ('+pct+'%)';
  document.getElementById('rde').textContent=lv.d;
  document.getElementById('rsk').innerHTML=Object.entries(sm).map(([k,v])=>`<div class="sb"><div class="sl">${k}</div><div class="sv">${v.c}/${v.t}</div></div>`).join('');
  const L=['a','b','c'];
  document.getElementById('ran').innerHTML=Q.map((q,qi)=>{const ua=ans[qi];const ok=ua===q.c;const ch=(ua!==undefined&&ua>=0)?L[ua]+') '+q.o[ua]:'—';return`<div class="ai ${ok?'aok':'afl'}"><div class="aih"><span class="aiq">Q${qi+1}: ${q.t}</span><span class="aib">${ok?'✓':'✗'}</span></div>${!ok?`<div class="aid">Your answer: <strong>${ch}</strong> · Correct: <strong>${L[q.c]}) ${q.o[q.c]}</strong></div>`:''}<div class="aid">${q.e}</div><div class="ais">${q.s}</div></div>`}).join('');
}
function lvl(p){if(p<40)return{l:'A2',d:'Elementary. Conditionals need a lot of practice.'};if(p<55)return{l:'B1',d:'Intermediate. Good base — mixed and inverted conditionals need work.'};if(p<70)return{l:'B2',d:'Upper-Intermediate. Solid but advanced forms need refining.'};if(p<85)return{l:'C1',d:'Advanced. Strong command of conditional structures.'};return{l:'C2',d:'Proficient. Excellent grasp of all conditional forms.'}}
function restart(){ans={};ansd={};document.getElementById('results').style.display='none';document.querySelectorAll('.qc').forEach(c=>c.style.display='');render();showC(0)}
window.onload=init;
</script>
</body>
</html>
